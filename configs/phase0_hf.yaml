name: phase0_hf
pool: hf_logo_poisoned
image_dir: results/phase3_generation/hf_logo_poisoned_images
n_images: 10
seed: 42

denoisers:
  bm3d:
    sigma_psd: 0.25  # chosen via Band 3 pre-flight sweep (see decision_criteria.md Appendix A)
  wavelet:
    wavelet: db4
    method: BayesShrink
    mode: soft
  dncnn:
    model_path: third_party/KAIR/model_zoo/dncnn_color_blind.pth
    in_nc: 3
    out_nc: 3
    nc: 64
    nb: 20

owlv2:
  model: google/owlv2-base-patch16-ensemble
  queries:
    - "huggingface logo"
    - "yellow smiling emoji"
  threshold: 0.01
  batch_size: 4

output_dir: results/phase0_residuals

visualization:
  primary_norm: abs_99pct
  secondary_norm: histeq
  formats:
    - pdf
    - montage_png
    - individual_png
